<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>浪漫公會成員表格</title>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/css/luckysheet.css' />
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/luckysheet.umd.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #luckysheet { width: 100%; height: 100%; position: absolute; }
        #sync-status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 12px; z-index: 9999; }
        #manual-save-btn { position: fixed; top: 10px; left: 10px; z-index: 9999; padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <button id="manual-save-btn" onclick="saveToGitHub()">💾 手動儲存</button>
    <div id="sync-status">💾 初始化中...</div>
    <div id="luckysheet"></div>

    <script>
        const GH_OWNER = "line71193-source";
        const GH_REPO = "Romant1c";
        const GH_ISSUE_NUMBER = "1";
        const TOKEN_PART1 = "github_pat_";
        const TOKEN_PART2 = "11BVPH2GQ0ZqDQXOLOh4o5_VUixbN7HGhd0rJ1J7b22mnzbHotD7rLVily2J9hHu9YQHJUML476VeDtl2K";
        const GH_TOKEN = TOKEN_PART1 + TOKEN_PART2;

        async function loadFromGitHub() {
            try {
                const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}`, {
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Cache-Control": "no-cache" }
                });
                const data = await response.json();
                let sheetData = (data.body && data.body.trim().startsWith("[")) ? JSON.parse(data.body) : null;
                initLuckysheet(sheetData);
                document.getElementById('sync-status').innerText = "🟢 資料已載入";
            } catch (e) {
                initLuckysheet(null);
                document.getElementById('sync-status').innerText = "⚠️ 使用新表格";
            }
        }

        async function saveToGitHub() {
            document.getElementById('sync-status').innerText = "⏳ 儲存中...";
            // 只抓取必要資料，避免 JSON 過大導致 GitHub API 拒絕請求
            let rawData = luckysheet.getluckysheetfile();
            let cleanData = rawData.map(sheet => ({
                name: sheet.name,
                celldata: sheet.celldata,
                config: sheet.config
            }));

            try {
                const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}`, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ body: JSON.stringify(cleanData) })
                });
                if(response.ok) {
                    document.getElementById('sync-status').innerText = "🟢 儲存成功";
                } else {
                    throw new Error("API Error");
                }
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ 儲存失敗 (資料過大)";
                console.error(e);
            }
        }

        function initLuckysheet(data) {
            luckysheet.create({
                container: 'luckysheet',
                lang: 'zh',
                data: data || [
                    {"name":"Romant1c","celldata":[]},
                    {"name":"Romant2c","celldata":[]},
                    {"name":"Romant4c","celldata":[]},
                    {"name":"Romant5c","celldata":[]}
                ]
            });
            // 自動儲存設定 (每 60 秒)
            setInterval(saveToGitHub, 60000);
        }

        window.onload = loadFromGitHub;
    </script>
</body>
</html>
