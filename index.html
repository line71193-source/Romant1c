<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浪漫公會成員表格</title>
    
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/css/luckysheet.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/assets/iconfont/iconfont.css' />
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/luckysheet.umd.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #luckysheet { margin: 0; padding: 0; width: 100%; height: 100%; position: absolute; left: 0; top: 0; }
        #sync-status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 6px 12px; border-radius: 4px; font-size: 12px; z-index: 9999; pointer-events: none; }
        #manual-save-btn { position: fixed; top: 10px; left: 10px; z-index: 9999; padding: 8px 15px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <button id="manual-save-btn" onclick="saveToGitHub()">💾 手動儲存</button>
    <div id="sync-status">💾 正在從 GitHub 讀取進度...</div>
    <div id="luckysheet"></div>

    <script>
        const GH_OWNER = "line71193-source";
        const GH_REPO = "Romant1c";
        const GH_ISSUE_NUMBER = "1";
        const TOKEN_PART1 = "github_pat_";
        const TOKEN_PART2 = "11BVPH2GQ0ZqDQXOLOh4o5_VUixbN7HGhd0rJ1J7b22mnzbHotD7rLVily2J9hHu9YQHJUML476VeDtl2K";
        const GH_TOKEN = TOKEN_PART1 + TOKEN_PART2;

        let isSaving = false;
        const defaultSheet = [
            {"name":"Romant1c","celldata":[]},
            {"name":"Romant2c","celldata":[]},
            {"name":"Romant4c","celldata":[]},
            {"name":"Romant5c","celldata":[]}
        ];

        async function loadFromGitHub() {
            const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}`;
            try {
                const response = await fetch(url, { headers: { "Authorization": `token ${GH_TOKEN}` } });
                const data = await response.json();
                let sheetData = (data.body && data.body.trim().startsWith("[")) ? JSON.parse(data.body) : defaultSheet;
                initLuckysheet(sheetData);
                document.getElementById('sync-status').innerText = "🟢 已載入雲端存檔";
            } catch (e) {
                initLuckysheet(defaultSheet);
                document.getElementById('sync-status').innerText = "❌ 讀取失敗";
            }
        }

        async function saveToGitHub() {
            if (isSaving) return;
            isSaving = true;
            document.getElementById('sync-status').innerText = "⏳ 正在自動儲存到Github...";
            document.getElementById('sync-status').style.color = "#ffff00";

            try {
                const currentData = luckysheet.getluckysheetfile();
                const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}`;
                await fetch(url, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ body: JSON.stringify(currentData) })
                });
                document.getElementById('sync-status').innerText = "🟢 已儲存";
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ 儲存失敗";
            } finally {
                setTimeout(() => { isSaving = false; }, 3000);
            }
        }

        function initLuckysheet(data) {
            luckysheet.create({
                container: 'luckysheet',
                title: '浪漫公會人員表格',
                lang: 'zh',
                data: data
            });

            // 設定每 30 秒自動儲存一次
            setInterval(() => {
                saveToGitHub();
            }, 30000);
        }

        window.onload = loadFromGitHub;
    </script>
</body>
</html>
