<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>浪漫公會成員表格</title>
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/css/luckysheet.css' />
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/luckysheet.umd.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        #luckysheet { width: 100%; height: 100%; position: absolute; }
        #sync-status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; z-index: 9999; }
    </style>
</head>
<body>
    <button style="position:fixed; top:10px; left:10px; z-index:9999;" onclick="saveToGitHub()">💾 手動儲存</button>
    <div id="sync-status">💾 讀取中...</div>
    <div id="luckysheet"></div>

    <script>
        const GH_OWNER = "line71193-source";
        const GH_REPO = "Romant1c";
        const GH_ISSUE_NUMBER = "1";
        const TOKEN_PART1 = "github_pat_";
        const TOKEN_PART2 = "11BVPH2GQ0ZqDQXOLOh4o5_VUixbN7HGhd0rJ1J7b22mnzbHotD7rLVily2J9hHu9YQHJUML476VeDtl2K";
        const GH_TOKEN = TOKEN_PART1 + TOKEN_PART2;

        async function saveToGitHub() {
            document.getElementById('sync-status').innerText = "⏳ 壓縮並儲存中...";
            
            // 獲取當前數據並深拷貝
            let fileData = JSON.parse(JSON.stringify(luckysheet.getluckysheetfile()));
            
            // 強制清理：移除 Luckysheet 可能導致過大的緩存或冗餘數據
            fileData.forEach(sheet => {
                delete sheet.luckysheet_select_save;
                delete sheet.zoom;
            });
            
            try {
                const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}`, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ body: JSON.stringify(fileData) })
                });

                if (response.ok) {
                    document.getElementById('sync-status').innerText = "🟢 存檔成功";
                } else {
                    document.getElementById('sync-status').innerText = "❌ 失敗！請檢查 Console";
                }
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ 網路異常";
            }
        }

        function initLuckysheet(data) {
            luckysheet.create({
                container: 'luckysheet',
                data: data,
                hook: {
                    workbookCreateAfter: function() {
                        const sheets = luckysheet.getluckysheetfile();
                        sheets.forEach((_, index) => {
                            let colConfig = {};
                            for(let i = 0; i < 30; i++) colConfig[i] = 115;
                            luckysheet.setColumnWidth(colConfig, index);
                        });
                    }
                }
            });
        }

        // 讀取邏輯增加 cache 強制繞過
        fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}?t=${new Date().getTime()}`, {
            headers: { "Authorization": `token ${GH_TOKEN}` }
        }).then(r => r.json()).then(data => {
            if(data.body) {
                initLuckysheet(JSON.parse(data.body));
                document.getElementById('sync-status').innerText = "🟢 已讀取";
            }
        });
    </script>
</body>
</html>
