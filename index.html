<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>浪漫公會成員表格</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/css/pluginsCss.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/plugins.css' />
    <link rel='stylesheet' href='https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/css/luckysheet.css' />
    
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/plugins/js/plugin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luckysheet@latest/dist/luckysheet.umd.js"></script>
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #fff; }
        #luckysheet { width: 100%; height: 100%; position: absolute; }
        #sync-status { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); color: #fff; padding: 8px; z-index: 9999; border-radius: 5px; font-size: 14px; }
        #save-btn { position: fixed; top: 10px; left: 10px; z-index: 9999; padding: 10px 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <button id="save-btn" onclick="saveToGitHub()">💾 手動儲存</button>
    <div id="sync-status">💾 讀取中...</div>
    <div id="luckysheet"></div>

    <script>
        const GH_OWNER = "line71193-source";
        const GH_REPO = "Romant1c";
        const GH_ISSUE_NUMBER = "1";
        const TOKEN_PART1 = "github_pat_";
        const TOKEN_PART2 = "11BVPH2GQ0ZqDQXOLOh4o5_VUixbN7HGhd0rJ1J7b22mnzbHotD7rLVily2J9hHu9YQHJUML476VeDtl2K";
        const GH_TOKEN = TOKEN_PART1 + TOKEN_PART2;

        async function saveToGitHub() {
            document.getElementById('sync-status').innerText = "⏳ 正在儲存...";
            let allSheets = luckysheet.getluckysheetfile();
            try {
                const response = await fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}`, {
                    method: "PATCH",
                    headers: { "Authorization": `token ${GH_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ body: JSON.stringify(allSheets) })
                });
                document.getElementById('sync-status').innerText = response.ok ? "🟢 存檔成功" : "❌ 存檔失敗";
            } catch (e) {
                document.getElementById('sync-status').innerText = "❌ 網路異常";
            }
        }

        function initLuckysheet(data) {
            luckysheet.create({
                container: 'luckysheet',
                lang: 'zh',
                showtoolbar: true,
                showinfobar: true,
                showsheetbar: true,
                data: data || [{ name: "Sheet1", status: 1, order: 0 }],
                title: "浪漫公會成員表格"
            });
        }

        window.onload = function() {
            // 等待字體載入完成，防止工具列圖示異常
            document.fonts.ready.then(() => {
                fetch(`https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/issues/${GH_ISSUE_NUMBER}?t=${new Date().getTime()}`, {
                    headers: { "Authorization": `token ${GH_TOKEN}` }
                })
                .then(r => r.json())
                .then(data => {
                    let initialData = null;
                    if (data.body && data.body.length > 5) {
                        try { initialData = JSON.parse(data.body); } catch (e) { console.error("解析失敗"); }
                    }
                    initLuckysheet(initialData);
                    document.getElementById('sync-status').innerText = "🟢 已載入";
                })
                .catch(() => {
                    initLuckysheet(null);
                    document.getElementById('sync-status').innerText = "🟢 已初始化";
                });
            });
        };
    </script>
</body>
</html>
